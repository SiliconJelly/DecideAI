# DecideAI HR Helper System - Docker Compose
# Production-ready deployment for German & Japanese institutions
version: '3.8'

services:
  # DecideAI API Service
  decideai-api:
    build: 
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://decideai:decideai_pass@db:5432/decideai_hr
      - SECRET_KEY=${SECRET_KEY:-decideai-production-secret-change-me}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-secret-change-me}
      - DEBUG=false
      - SUPPORTED_LANGUAGES=de,ja,en
      - DEFAULT_LANGUAGE=en
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    depends_on:
      - db
      - redis
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - decideai-network

  # DecideAI Web Interface
  decideai-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "7860:7860"
    environment:
      - API_URL=http://decideai-api:8000
      - SUPPORTED_LANGUAGES=de,ja,en
    volumes:
      - app_data:/app/data
    depends_on:
      - decideai-api
    restart: unless-stopped
    networks:
      - decideai-network

  # Ollama AI Service
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - decideai-network
    # GPU support (uncomment if available)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=decideai_hr
      - POSTGRES_USER=decideai
      - POSTGRES_PASSWORD=${DB_PASSWORD:-decideai_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decideai"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - decideai-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - decideai-network

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/nginx/ssl:/etc/nginx/ssl:ro
      - ./deployment/nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - decideai-api
      - decideai-ui
    restart: unless-stopped
    profiles:
      - production
    networks:
      - decideai-network

  # Model Initialization Service (runs once)
  model-init:
    build:
      context: .
      dockerfile: Dockerfile.model-init
    depends_on:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: "no"
    networks:
      - decideai-network
    profiles:
      - init

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_data:
    driver: local
  app_logs:
    driver: local
  ollama_data:
    driver: local

networks:
  decideai-network:
    driver: bridge
    name: decideai_network