[flake8]
max-line-length = 100
exclude = .git,__pycache__,build,dist

[isort]
profile = black
line_length = 100
multi_line_output = 3

[mypy]
python_version = 3.9
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy.plugins.sqlalchemy.ext.declarative.mapped_classes]
class_decorator_plugin = True

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
addopts = --cov=ai_employee_decision_system --cov-report=term-missing

[coverage:run]
source = ai_employee_decision_system
omit = tests/*