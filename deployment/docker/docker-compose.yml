version: '3.8'

services:
  # Backend API service
  backend:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    image: kiro-smart-ocr-backend:latest
    container_name: kiro-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql://kiro_user:kiro_pass@db:5432/kiro_smart_ocr
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change_this_in_production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt_secret_change_in_production}
      - AI_MODELS_PATH=/app/models
    volumes:
      - ../../ai-engine/models:/app/models
      - ../../uploads:/app/uploads
      - ../../logs:/app/logs
    depends_on:
      - db
      - redis
    networks:
      - kiro-network

  # Frontend service
  frontend:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.frontend
    image: kiro-smart-ocr-frontend:latest
    container_name: kiro-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - kiro-network

  # Database service
  db:
    image: postgres:14-alpine
    container_name: kiro-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=kiro_user
      - POSTGRES_PASSWORD=kiro_pass
      - POSTGRES_DB=kiro_smart_ocr
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - kiro-network

  # Redis service for caching and message queue
  redis:
    image: redis:7-alpine
    container_name: kiro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - kiro-network

  # Monitoring service
  prometheus:
    image: prom/prometheus:latest
    container_name: kiro-prometheus
    restart: unless-stopped
    volumes:
      - ../../monitoring/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - kiro-network

  # Visualization service
  grafana:
    image: grafana/grafana:latest
    container_name: kiro-grafana
    restart: unless-stopped
    volumes:
      - ../../monitoring/grafana:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - kiro-network

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  kiro-network:
    driver: bridge