apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiro-backend
  namespace: kiro-smart-ocr
  labels:
    app: kiro-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kiro-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kiro-backend
    spec:
      containers:
      - name: kiro-backend
        image: ${DOCKER_REGISTRY}/kiro-smart-ocr-backend:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: DEBUG
          value: "false"
        - name: LOG_LEVEL
          value: "INFO"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: kiro-db-credentials
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: kiro-redis-credentials
              key: redis-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: kiro-app-secrets
              key: secret-key
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: kiro-app-secrets
              key: jwt-secret-key
        - name: AI_MODELS_PATH
          value: "/app/models"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: models-volume
          mountPath: /app/models
        - name: uploads-volume
          mountPath: /app/uploads
        - name: logs-volume
          mountPath: /app/logs
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: models-volume
        persistentVolumeClaim:
          claimName: kiro-models-pvc
      - name: uploads-volume
        persistentVolumeClaim:
          claimName: kiro-uploads-pvc
      - name: logs-volume
        persistentVolumeClaim:
          claimName: kiro-logs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: kiro-backend-service
  namespace: kiro-smart-ocr
spec:
  selector:
    app: kiro-backend
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kiro-backend-hpa
  namespace: kiro-smart-ocr
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kiro-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80