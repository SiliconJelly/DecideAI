apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kiro-postgres
  namespace: kiro-smart-ocr
spec:
  serviceName: "kiro-postgres"
  replicas: 1
  selector:
    matchLabels:
      app: kiro-postgres
  template:
    metadata:
      labels:
        app: kiro-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:14-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: kiro-db-credentials
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kiro-db-credentials
              key: password
        - name: POSTGRES_DB
          value: kiro_smart_ocr
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "standard"
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kiro-postgres-service
  namespace: kiro-smart-ocr
  labels:
    app: kiro-postgres
spec:
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  selector:
    app: kiro-postgres
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: kiro-db-credentials
  namespace: kiro-smart-ocr
type: Opaque
