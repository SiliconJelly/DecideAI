apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kiro-models-pvc
  namespace: kiro-smart-ocr
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kiro-uploads-pvc
  namespace: kiro-smart-ocr
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kiro-logs-pvc
  namespace: kiro-smart-ocr
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard