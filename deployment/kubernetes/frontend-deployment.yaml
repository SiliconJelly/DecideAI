apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiro-frontend
  namespace: kiro-smart-ocr
  labels:
    app: kiro-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kiro-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kiro-frontend
    spec:
      containers:
      - name: kiro-frontend
        image: ${DOCKER_REGISTRY}/kiro-smart-ocr-frontend:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        env:
        - name: REACT_APP_API_URL
          value: "https://api.kiro-ocr.com"
        - name: REACT_APP_ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kiro-frontend-service
  namespace: kiro-smart-ocr
spec:
  selector:
    app: kiro-frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kiro-frontend-ingress
  namespace: kiro-smart-ocr
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - kiro-ocr.com
    - www.kiro-ocr.com
    secretName: kiro-frontend-tls
  rules:
  - host: kiro-ocr.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kiro-frontend-service
            port:
              number: 80
  - host: www.kiro-ocr.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kiro-frontend-service
            port:
              number: 80