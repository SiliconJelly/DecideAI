apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiro-redis
  namespace: kiro-smart-ocr
  labels:
    app: kiro-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kiro-redis
  template:
    metadata:
      labels:
        app: kiro-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        volumeMounts:
        - name: redis-data
          mountPath: /data
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: kiro-redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: kiro-redis-service
  namespace: kiro-smart-ocr
spec:
  selector:
    app: kiro-redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kiro-redis-pvc
  namespace: kiro-smart-ocr
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
apiVersion: v1
kind: Secret
metadata:
  name: kiro-redis-credentials
  namespace: kiro-smart-ocr
type: Opaque
data:
  redis-url: cmVkaXM6Ly9raXJvLXJlZGlzLXNlcnZpY2U6NjM3OS8w  # redis://kiro-redis-service:6379/0 (base64 encoded)