[tox]
envlist = py39, py310, lint, type
isolated_build = True

[testenv]
deps =
    pytest
    pytest-cov
commands =
    pytest {posargs:tests}

[testenv:lint]
deps =
    flake8
    black
    isort
commands =
    flake8 ai_employee_decision_system tests
    black --check ai_employee_decision_system tests
    isort --check ai_employee_decision_system tests

[testenv:type]
deps =
    mypy
    types-requests
    sqlalchemy-stubs
commands =
    mypy ai_employee_decision_system